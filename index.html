<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Training Center — Study & Quiz</title>
<style>
  /* ================= DESIGN TOKENS ================= */
  :root{
    --bg:#090d12;
    --panel:#101720;
    --panel2:#16202b;
    --panel3:#1c2836;
    --line:#1f2c3a;
    --line2:#2c3d50;
    --text:#e9f0f8;
    --soft:#c7d5e3;
    --muted:#8faabf;
    --faint:#5f7488;
    --acc:#3ecbe0;
    --acc2:#59e3b3;
    --acc-ink:#04252d;
    --acc-soft:rgba(62,203,224,.10);
    --acc-line:rgba(62,203,224,.38);
    --alt:#a78bfa;
    --good:#4ad07a;
    --good-dim:rgba(74,208,122,.10);
    --bad:#f2606a;
    --bad-dim:rgba(242,96,106,.10);
    --grad:linear-gradient(92deg,var(--acc),var(--acc2));
    --radius:14px;
    --sidebar:296px;
    --ease:cubic-bezier(.16,1,.3,1);
    --serif:"Iowan Old Style","Palatino Nova",Palatino,"Book Antiqua",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 560px at 88% -12%, rgba(62,203,224,.075), transparent 60%),
      radial-gradient(900px 520px at -12% 112%, rgba(89,227,179,.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font:16px/1.62 var(--sans);
    -webkit-font-smoothing:antialiased;
    -webkit-text-size-adjust:100%;
  }
  .app{display:flex;min-height:100vh;}
  ::selection{background:rgba(62,203,224,.28);}
  :focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:6px;}

  /* ================= SIDEBAR ================= */
  aside{
    width:var(--sidebar);flex:0 0 var(--sidebar);
    background:linear-gradient(180deg,#111925 0%,var(--panel) 30%);
    border-right:1px solid var(--line);
    padding:26px 18px 44px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  aside::-webkit-scrollbar{width:8px;}
  aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
  aside::-webkit-scrollbar-thumb:hover{background:var(--line2);}

  .brand{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:-.01em;line-height:1.15;}
  .brand::before{
    content:"FIELD STUDY";display:block;font-family:var(--mono);font-size:10px;font-weight:600;
    letter-spacing:.22em;color:var(--acc);margin-bottom:7px;
  }
  .brand small{
    display:block;font-family:var(--sans);letter-spacing:0;color:var(--muted);
    font-weight:400;font-size:12.5px;margin-top:6px;line-height:1.5;
  }

  .overall{
    margin:14px 0 4px;padding:13px 14px;
    background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);
  }
  .stop{display:flex;align-items:center;gap:13px;}
  .sinfo{flex:1;min-width:0;}
  .ring{
    --p:0;position:relative;width:54px;height:54px;flex:0 0 54px;border-radius:50%;
    background:conic-gradient(var(--acc) 0%,var(--acc2) calc(var(--p)*1%),rgba(255,255,255,.07) 0);
    display:grid;place-items:center;
  }
  .ring::before{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--panel2);}
  .overall .num{position:relative;font-size:13.5px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .overall .lbl{
    font-family:var(--mono);font-size:10px;color:var(--faint);line-height:1.4;
    margin-top:11px;padding-top:10px;border-top:1px solid var(--line);letter-spacing:.02em;
  }

  nav{display:flex;flex-direction:column;gap:3px;}
  .navbtn{
    display:block;width:100%;text-align:left;cursor:pointer;position:relative;
    background:transparent;border:1px solid transparent;color:var(--soft);
    border-radius:10px;padding:8px 12px;font:inherit;font-size:13.5px;line-height:1.32;
    transition:background .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease);
  }
  .navbtn:hover{background:var(--panel2);color:var(--text);}
  .navbtn.active{
    background:var(--acc-soft);border-color:var(--acc-line);color:var(--text);
    box-shadow:inset 2.5px 0 0 var(--acc);
  }
  .navbtn .row{display:flex;align-items:baseline;gap:8px;justify-content:space-between;}
  .navbtn .row{min-width:0;}
  .navbtn .t{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  .navbtn .sc{
    font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap;
    font-variant-numeric:tabular-nums;letter-spacing:.02em;
  }
  .navbtn.active .sc{color:var(--acc);}
  .bar{height:3px;border-radius:99px;background:rgba(255,255,255,.06);margin-top:8px;overflow:hidden;}
  .bar i{display:block;height:100%;background:var(--grad);width:0;transition:width .45s var(--ease);}
  .bar i.full{background:var(--good);box-shadow:0 0 8px rgba(74,208,122,.55);}
  .navsep{height:1px;background:var(--line);margin:14px 2px;}
  .resetbtn{
    margin-top:24px;width:100%;background:transparent;border:1px solid var(--line);color:var(--faint);
    border-radius:9px;padding:9px;font:inherit;font-size:12px;cursor:pointer;
    transition:border-color .15s,color .15s;
  }
  .resetbtn:hover{border-color:var(--bad);color:var(--bad);}
  .xferbtn{margin-top:22px;margin-bottom:8px;}
  .xferbtn:hover{border-color:var(--acc);color:var(--acc);}
  .xferbox{width:100%;min-height:96px;resize:vertical;font-family:var(--mono);font-size:11px;line-height:1.5;
    color:var(--soft);background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:11px 13px;
    word-break:break-all;margin-bottom:12px;}
  .xferbox:focus{outline:none;border-color:var(--acc);}
  .xfertabs{display:flex;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:16px;}
  .xfertabs button{flex:1;font:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);
    background:transparent;border:none;border-radius:8px;padding:8px;transition:background .15s,color .15s;}
  .xfertabs button.on{background:var(--grad);color:var(--acc-ink);}
  .xfermsg{font-size:12.5px;color:var(--muted);margin:2px 0 12px;line-height:1.5;min-height:16px;}
  .xfermsg.ok{color:var(--good);}
  .xfermsg.bad{color:var(--bad);}

  /* ================= XP / STREAK ================= */
  .xprow{display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .lvl{
    font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;
    background:var(--grad);color:var(--acc-ink);border-radius:6px;padding:3px 7px;flex:none;
  }
  .rank{
    font-size:12.5px;font-weight:600;color:var(--text);margin:5px 0 0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .flame{
    font-family:var(--mono);font-size:11px;color:var(--muted);flex:none;
    font-variant-numeric:tabular-nums;
  }
  .flame.hot{color:#ffb35c;}
  .xpbar{height:3px;border-radius:99px;background:rgba(255,255,255,.06);margin:8px 0 6px;overflow:hidden;}
  .xpbar i{display:block;height:100%;width:0;background:var(--grad);transition:width .5s var(--ease);}
  .xpfoot{display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .xpmeta{font-family:var(--mono);font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums;}
  .dots{display:flex;gap:4px;}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.08);}
  .dot.on{background:var(--acc2);}
  .dot.now{box-shadow:0 0 0 2px rgba(89,227,179,.22);}

  #toasts{
    position:fixed;right:22px;bottom:22px;z-index:60;
    display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none;
  }
  .toast{
    background:rgba(22,32,43,.94);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid var(--line2);border-radius:11px;padding:9px 15px;
    font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--acc2);
    box-shadow:0 10px 30px -12px rgba(0,0,0,.8);white-space:nowrap;
  }
  .toast.vr{color:#ffd97d;border-color:rgba(255,217,125,.4);}
  .toast.streak{color:#ffb35c;border-color:rgba(255,179,92,.4);}
  .toast.up{
    color:var(--text);border-color:var(--acc);padding:12px 18px;font-size:13px;
    background:linear-gradient(135deg,rgba(62,203,224,.22),rgba(89,227,179,.14)),rgba(22,32,43,.96);
  }
  .toast.up b{display:block;font-family:var(--serif);font-size:17px;font-weight:700;margin-top:2px;letter-spacing:-.01em;}
  @media (max-width:900px){
    #toasts{right:12px;left:12px;bottom:12px;align-items:center;}
    .toast{white-space:normal;text-align:center;}
  }

  /* ================= KNOWLEDGE MAP ================= */
  .skywrap{
    position:relative;margin-top:18px;border-radius:var(--radius);overflow:hidden;
    border:1px solid var(--line);
    background:radial-gradient(120% 90% at 50% 12%, rgba(62,203,224,.07), transparent 60%),
               linear-gradient(180deg,#0a1017,#070b10);
  }
  #sky{display:block;width:100%;height:440px;cursor:grab;touch-action:none;}
  #sky.grabbing{cursor:grabbing;}
  .skytip{
    position:absolute;pointer-events:none;z-index:3;transform:translate(-50%,-140%);
    background:rgba(10,16,22,.95);border:1px solid var(--line2);border-radius:9px;
    padding:6px 10px;font-size:12px;line-height:1.45;white-space:nowrap;opacity:0;
    transition:opacity .12s;box-shadow:0 8px 24px -10px rgba(0,0,0,.9);
  }
  .skytip.on{opacity:1;}
  .skytip b{display:block;font-size:11px;color:var(--muted);font-weight:600;}
  .skyhint{
    position:absolute;left:14px;bottom:12px;font-family:var(--mono);font-size:10px;
    letter-spacing:.1em;color:var(--faint);pointer-events:none;
  }
  .skyspin{
    position:absolute;right:12px;top:12px;z-index:3;cursor:pointer;
    background:rgba(16,23,32,.8);border:1px solid var(--line2);border-radius:8px;
    color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    padding:6px 10px;transition:border-color .15s,color .15s;
  }
  .skyspin:hover{border-color:var(--acc);color:var(--acc);}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px;}
  .legend span{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);}
  .legend i{width:9px;height:9px;border-radius:50%;flex:none;}
  .mapstat{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(112px,1fr));gap:10px;margin-top:20px;
  }
  .mapstat div{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;}
  .mapstat b{display:block;font-family:var(--serif);font-size:24px;font-weight:700;line-height:1.1;letter-spacing:-.02em;}
  .mapstat small{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;}
  @media (max-width:900px){ #sky{height:340px;} }

  /* ================= NAV SECTIONS ================= */
  .navlabel{
    font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--faint);margin:16px 0 6px 12px;
  }
  .navlabel:first-child{margin-top:4px;}

  /* ================= PROFILES ================= */
  .pfchip{
    display:flex;align-items:center;gap:9px;width:100%;margin:16px 0 0;cursor:pointer;
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    padding:8px 10px;font:inherit;color:var(--text);text-align:left;
    transition:border-color .15s,background .15s;
  }
  .pfchip:hover{border-color:var(--acc-line);background:var(--panel3);}
  .pfchip .av{
    width:30px;height:30px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:16px;
  }
  .pfchip .nm{flex:1;min-width:0;font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pfchip .sw{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;color:var(--faint);flex:none;}

  .pfwrap{max-width:620px;}
  .pfgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;margin-top:8px;}
  .pfcard{
    position:relative;cursor:pointer;font:inherit;color:var(--text);text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 12px 16px;
    transition:border-color .16s var(--ease),background .16s var(--ease),transform .16s var(--ease);
  }
  .pfcard:hover{border-color:var(--acc-line);background:var(--panel2);}
  .pfcard .av{width:56px;height:56px;border-radius:50%;margin:0 auto 11px;display:grid;place-items:center;font-size:28px;}
  .pfcard b{display:block;font-family:var(--serif);font-size:16.5px;font-weight:700;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .pfcard small{display:block;font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:5px;letter-spacing:.02em;}
  .pfcard.new{border-style:dashed;color:var(--muted);}
  .pfcard.new .av{background:var(--acc-soft);color:var(--acc);font-size:24px;}
  .pftools{display:none;gap:6px;justify-content:center;margin-top:11px;}
  .pfgrid.editing .pftools{display:flex;}
  .pfgrid.editing .pfcard.new{opacity:.3;pointer-events:none;}
  .pftool{
    width:32px;height:30px;border-radius:8px;border:1px solid var(--line2);background:var(--panel3);
    font-size:13px;cursor:pointer;color:var(--soft);transition:border-color .15s;
  }
  .pftool:hover{border-color:var(--acc);}
  .pfmanage{
    margin-top:20px;background:none;border:none;color:var(--faint);font:inherit;font-size:13px;
    cursor:pointer;padding:6px 0;transition:color .15s;
  }
  .pfmanage:hover{color:var(--acc);}

  #modal:empty{display:none;}
  .ovl{
    position:fixed;inset:0;z-index:70;display:grid;place-items:center;padding:20px;
    background:rgba(4,8,12,.72);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  }
  .mcard{
    width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line2);
    border-radius:16px;padding:24px;box-shadow:0 30px 70px -20px rgba(0,0,0,.9);
  }
  .mcard h3{font-family:var(--serif);font-size:21px;margin:0 0 6px;font-weight:700;letter-spacing:-.01em;}
  .mcard p{color:var(--muted);font-size:13.5px;margin:0 0 16px;line-height:1.6;}
  .mcard input{
    width:100%;font:inherit;font-size:16px;color:var(--text);background:var(--panel2);
    border:1px solid var(--line2);border-radius:11px;padding:12px 14px;margin-bottom:14px;
  }
  .mcard input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(62,203,224,.15);}
  .mcard .btn{width:100%;}
  .mcard .btn.danger{background:linear-gradient(180deg,#f4737c,#e04b56);color:#fff;box-shadow:none;}
  .mcancel{
    display:block;width:100%;margin-top:10px;background:none;border:none;color:var(--faint);
    font:inherit;font-size:13px;cursor:pointer;padding:8px;
  }
  .mcancel:hover{color:var(--text);}
  .emopick{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
  .emopick button{
    width:38px;height:38px;border-radius:10px;font-size:19px;cursor:pointer;
    background:var(--panel2);border:1px solid var(--line);transition:border-color .15s,transform .15s;
  }
  .emopick button:hover{border-color:var(--acc-line);}
  .emopick button.sel{border-color:var(--acc);background:var(--acc-soft);}

  body.noprofile aside .overall,
  body.noprofile aside nav,
  body.noprofile aside .navsep,
  body.noprofile aside .resetbtn,
  body.noprofile aside .pfchip,
  body.noprofile .menutoggle{display:none !important;}

  /* ================= MAIN ================= */
  main{flex:1;min-width:0;padding:44px 48px 110px;max-width:860px;}
  h1{
    font-family:var(--serif);font-size:clamp(28px,4.2vw,38px);line-height:1.12;
    margin:0 0 10px;letter-spacing:-.015em;font-weight:700;
  }
  .kicker{
    font-family:var(--mono);color:var(--acc);font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;font-weight:600;margin-bottom:12px;
  }
  .summary{color:var(--soft);font-size:17px;line-height:1.7;margin:0 0 26px;max-width:64ch;}
  h2{
    font-family:var(--mono);font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin:36px 0 14px;font-weight:600;
  }
  ul.points{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
  ul.points li{
    background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:13px 16px 13px 40px;position:relative;color:var(--soft);
  }
  ul.points li::before{
    content:"✓";position:absolute;left:15px;top:12px;
    color:var(--acc);font-weight:800;font-size:13px;
  }
  .verbatim{
    background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 20px;margin:12px 0;position:relative;overflow:hidden;
  }
  .verbatim::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--grad);}
  .verbatim .vt{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--acc);font-weight:600;margin-bottom:8px;
  }
  .verbatim pre{margin:0;white-space:pre-wrap;font:15.5px/1.65 var(--serif);color:#dde8f2;}
  .srcs{
    font-family:var(--mono);font-size:11.5px;color:var(--faint);
    margin-top:30px;padding-top:16px;border-top:1px solid var(--line);letter-spacing:.02em;
  }

  .btn{
    display:inline-block;cursor:pointer;font:inherit;font-weight:700;letter-spacing:.005em;
    background:linear-gradient(180deg,#4bd4e8,#2eb2c8);color:var(--acc-ink);
    border:none;border-radius:12px;padding:13px 24px;
    box-shadow:0 8px 20px -10px rgba(62,203,224,.55),inset 0 1px 0 rgba(255,255,255,.28);
    transition:transform .16s var(--ease),box-shadow .16s var(--ease),filter .16s;
  }
  .btn:hover{filter:brightness(1.06);box-shadow:0 10px 24px -10px rgba(62,203,224,.7),inset 0 1px 0 rgba(255,255,255,.28);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.4;cursor:default;box-shadow:none;transform:none;filter:none;}
  .btn.ghost{
    background:transparent;color:var(--soft);border:1px solid var(--line2);box-shadow:none;
    transition:border-color .16s,color .16s,background .16s;
  }
  .btn.ghost:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-soft);filter:none;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:30px;align-items:center;}

  /* ================= QUIZ ================= */
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .qcount{font-family:var(--mono);font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .qbar{height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-bottom:30px;}
  .qbar i{display:block;height:100%;background:var(--grad);width:0;transition:width .35s var(--ease);}
  .qtype{
    display:inline-block;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--acc);background:var(--acc-soft);border:1px solid var(--acc-line);
    border-radius:99px;padding:4px 12px;margin-bottom:14px;font-weight:600;
  }
  .qtext{font-family:var(--serif);font-size:23px;line-height:1.42;margin:0 0 24px;font-weight:600;letter-spacing:-.005em;max-width:60ch;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;cursor:pointer;font:inherit;font-size:15.5px;color:var(--soft);
    background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 18px;
    display:flex;gap:14px;align-items:flex-start;
    transition:border-color .15s var(--ease),background .15s var(--ease),transform .15s var(--ease);
  }
  .opt:hover:not(:disabled){border-color:var(--acc-line);background:var(--panel2);color:var(--text);}
  .opt:disabled{cursor:default;}
  .opt .key{
    flex:0 0 26px;height:26px;border-radius:8px;background:var(--panel3);border:1px solid var(--line2);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted);margin-top:1px;
    transition:background .15s,border-color .15s,color .15s;
  }
  .opt:hover:not(:disabled) .key{border-color:var(--acc);color:var(--acc);}
  .opt.correct{background:var(--good-dim);border-color:var(--good);color:var(--text);}
  .opt.correct .key{background:var(--good);border-color:var(--good);color:#03230f;}
  .opt.correct::after{content:"✓";margin-left:auto;color:var(--good);font-weight:800;align-self:center;}
  .opt.wrong{background:var(--bad-dim);border-color:var(--bad);color:var(--text);}
  .opt.wrong .key{background:var(--bad);border-color:var(--bad);color:#2a0508;}
  .opt.wrong::after{content:"✕";margin-left:auto;color:var(--bad);font-weight:800;align-self:center;}
  .fib{display:flex;gap:10px;flex-wrap:wrap;}
  .fib input{
    flex:1;min-width:200px;font:inherit;font-size:17px;color:var(--text);
    background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:14px 18px;
    transition:border-color .15s,box-shadow .15s;
  }
  .fib input::placeholder{color:var(--faint);}
  .fib input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(62,203,224,.15);}
  .fib input:disabled{opacity:.75;}
  .blank{color:var(--acc);letter-spacing:.06em;}
  .fb{margin-top:20px;border-radius:var(--radius);padding:16px 18px;border:1px solid var(--line);background:var(--panel);}

  .fb.no{border-color:rgba(242,96,106,.5);background:var(--bad-dim);}

  .fb.no .verdict{color:var(--bad);}
  .fb .why{color:var(--soft);line-height:1.65;}
  .fb .src{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:10px;letter-spacing:.02em;}

  .result{text-align:center;padding:44px 20px;}
  .result .score{
    font-family:var(--serif);font-size:78px;font-weight:700;line-height:1;letter-spacing:-.03em;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .result .pct{color:var(--acc);font-size:18px;margin-top:10px;font-weight:600;}
  .result .msg{color:var(--muted);margin-top:14px;max-width:44ch;margin-left:auto;margin-right:auto;}
  .result .btnrow{justify-content:center;}
  .result h2{text-align:left;}

  .note{
    font-size:13px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 16px;margin-top:20px;line-height:1.6;
  }

  .menutoggle{display:none;}

  /* ================= SCOPE SELECT ================= */
  .scoperow{display:flex;gap:10px;align-items:center;margin:18px 0 4px;color:var(--muted);font-size:13.5px;flex-wrap:wrap;}

    appearance:none;-webkit-appearance:none;

    color:var(--text);border:1px solid var(--line2);border-radius:10px;
    padding:9px 34px 9px 13px;font:inherit;font-size:13.5px;max-width:100%;cursor:pointer;
    transition:border-color .15s;
  }
  .scopesel:hover{border-color:var(--acc-line);}
  .scopesel:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(62,203,224,.15);}

  /* ================= QUIZ BUILDER ================= */
  .builder{margin:16px 0 6px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);}
  .bdeck + .bdeck{border-top:2px solid var(--line);}
  .bdeckname{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--acc);background:var(--panel2);padding:10px 15px;}
  .btopic{border-top:1px solid var(--line);}
  .brow{display:flex;align-items:center;gap:11px;padding:10px 15px;font-size:14.5px;color:var(--text);}
  .brow.btop{cursor:pointer;}
  .brow.btop:hover{background:var(--panel2);}
  .bcaret{flex:none;width:16px;text-align:center;color:var(--muted);font-size:10px;transition:transform .15s;background:none;border:none;cursor:pointer;padding:0;}
  .btopic.open .bcaret{transform:rotate(90deg);}
  .brow input[type=checkbox]{width:17px;height:17px;flex:none;accent-color:var(--acc);cursor:pointer;}
  .btop .bname{font-weight:600;}
  .bname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bcount{font-family:var(--mono);font-size:11px;color:var(--faint);flex:none;}
  .bsecs{display:none;background:var(--bg);}
  .btopic.open .bsecs{display:block;}
  .brow.bsec{padding-left:44px;color:var(--soft);font-size:13.5px;cursor:pointer;border-top:1px solid var(--line);}
  .brow.bsec:hover{background:var(--panel);}
  .builderbar{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--bg) 40%);padding-top:14px;}

  /* ================= DIFFICULTY ================= */
  .diffrow{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin:20px 0 2px;}
  .difflabel{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);}
  .diffseg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
  .diffseg button{
    font:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);

  }
  .diffseg button:hover{color:var(--text);}
  .diffseg button.on{background:var(--grad);color:var(--acc-ink);}

  .hintbtn:disabled{opacity:.35;cursor:default;}
  .opt.dimmed{opacity:.3;text-decoration:line-through;pointer-events:none;}

  .cmp{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin:14px 0;}

  .cmpgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cmpcol{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;}
  .cmpcol:first-child{border-top:2px solid var(--acc);}
  .cmpcol:last-child{border-top:2px solid var(--alt);}
  .cmpname{font-weight:700;color:var(--acc);font-size:13.5px;margin-bottom:7px;}
  .cmpcol:last-child .cmpname{color:var(--alt);}
  .cmpline{
    font-family:var(--serif);font-size:14.5px;color:var(--soft);

  }
  .cmptip{margin-top:12px;font-size:13px;color:var(--muted);line-height:1.6;}

  /* ================= EXAM ================= */
  .examtimer{

  .examtimer.low{border-color:var(--bad);}
  .examtimer.low span:last-child{color:var(--bad);}
  .rev{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:10px 0;}
  .rev .rq{font-weight:600;color:var(--text);line-height:1.5;}
  .rev .ra{font-size:14px;margin-top:7px;}
  .rev .ra.bad{color:var(--bad);}

  .rev .why{font-size:13.5px;color:var(--muted);margin-top:7px;line-height:1.6;}
  .rev .src{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:6px;letter-spacing:.02em;}

  /* ================= RESPONSIVE ================= */
  @media (max-width:900px){
    .app{flex-direction:column;}
    aside{
      width:100%;flex:none;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line);

    aside nav,aside .overall,aside .resetbtn,aside .navsep{display:none;}
    aside.open .overall{display:flex;}
    aside.open .resetbtn,aside.open .navsep{display:block;}
    aside.open nav{display:flex;}
    .menutoggle{
      display:block;margin-top:14px;width:100%;background:var(--panel2);border:1px solid var(--line2);
      color:var(--text);border-radius:11px;padding:12px;font:inherit;font-weight:600;cursor:pointer;
      transition:border-color .15s;
    }
    .menutoggle:active{border-color:var(--acc);}
    main{padding:26px 18px 90px;max-width:none;}
    .qtext{font-size:20px;}
    .result .score{font-size:58px;}
  }
  @media (max-width:640px){ .cmpgrid{grid-template-columns:1fr;} }

  /* ================= MOTION (progressive enhancement) ================= */
  @media (prefers-reduced-motion:no-preference){
    #main>*{animation:rise .38s var(--ease) both;}
    #main>*:nth-child(2){animation-delay:.04s;}
    #main>*:nth-child(3){animation-delay:.08s;}
    #main>*:nth-child(4){animation-delay:.12s;}
    #main>*:nth-child(5){animation-delay:.15s;}
    #main>*:nth-child(n+6){animation-delay:.18s;}
    .fb{animation:pop .32s var(--ease) both;}
    .opt:hover:not(:disabled){transform:translateX(3px);}
    .btn:hover{transform:translateY(-1px);}
    .examtimer.low span:last-child{animation:pulse 1s ease-in-out infinite;}
    .ring{transition:background .5s;}
  }
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.985);}to{opacity:1;transform:none;}}
  @keyframes pulse{50%{opacity:.45;}}
</style>

  summary:"Punishment also splits positive (presenting something unfavorable) and negative (removing something favorable). The deck sets three hard conditions on any punishment — appropriate, timely, consistent — and names secondary punishments such as a warning beep or a verbal marker. It ends on the cost of getting this wrong: excessive punishment can produce learned helplessness.",
  points:[
    "Positive punishment is the presentation of an unfavorable event or outcome in order to weaken the response it follows.",
    "Negative punishment occurs when a favorable event or outcome is removed after a behavior occurs.",
    "Punishment must be appropriate: the minimum punishment required to create the desired change in behavior.",
    "Punishment must be timely — attached to the misbehavior; delayed punishment is ineffective.",
    "Punishment must be consistent: if you can't do it every time, best not do it at all; and beware of self-rewarding behaviors.",
    "Secondary punishments include a warning tone or beep, and the verbal “Uh uh” or “No”.",
    "Learned helplessness is when the dog believes it has no control over its environment — summarised as “No matter what I do, I'm wrong” and as resignation.",
    "Learned helplessness is frequently brought about by use of excessive punishment and may lead to escape, avoidance, aggression, or other negative responses."
  ],
  verbatim:[

  ],

{
  id:"schedules",
  title:"Schedules of Reinforcement",
  sources:["IMG_3658.HEIC","IMG_3659.HEIC","IMG_3660.HEIC"],
  summary:"Skinner's schedules describe when reinforcement arrives, split into duration schedules (based on time) and ratio schedules (based on number of responses), each of which can be fixed or variable. Continuous reinforcement — rewarding every single repetition — is impractical and leaves behavior prone to extinction. The deck's headline principle is that unpredictable reinforcement produces the most predictable behavior.",
  points:[
    "Analysis of behavior involves the effects of a schedule of reinforcement over time; the schedules listed are Skinner's.",
    "Duration Fixed: reinforcement is presented at fixed time periods, after the dog has performed the behavior.",
    "Duration Variable: the response is rewarded after the behavior has been performed for an unpredictable amount of time.",
    "Ratio Fixed: reinforcement is delivered after a specific number of responses.",
    "Ratio Variable: the response is reinforced after an unpredictable number of responses.",
    "Continuous reinforcement means every time a specific action is performed the subject instantly receives a reinforcement; it is impractical to use consistently and behavior is prone to extinction.",
    "Fixed Ratio (FR) produces a high, steady rate of response with only a brief pause after the delivery of the reinforcement.",
    "Variable Ratio (VR) creates a high, steady rate of responding and produces slightly higher rates than FR because the organism doesn't know when the next reinforcement is; the higher the ratio, the higher the response."
  ],
  verbatim:[
    {t:"Skinner's notable schedules of reinforcement (verbatim)",body:"Duration\n    Fixed; presented at fixed time periods, after dog has performed the behavior.\n    Variable; Response is rewarded after the behavior has been performed for an\n    unpredictable amount of time\n\nRatio\n    Fixed; Reinforcement is delivered after a specific number of responses\n    Variable; Response is reinforced after an unpredictable number of responses"},
    {t:"The headline principle",body:"Unpredictability in reinforcement = Greater predictability in behavior"}
  ],
  questions:[
    {type:"mc",q:"Whose notable schedules of reinforcement does the deck present?",opts:["Skinner's","Pavlov's","Karen Pryor's","John Watson's"],a:0,src:"IMG_3658.HEIC",why:"“Skinner's notable schedules of reinforcement:” introduces the list."},
    {type:"mc",q:"What are the two families of schedule listed?",opts:["Duration and Ratio","Fixed and Variable","Primary and Secondary","Positive and Negative"],a:0,src:"IMG_3658.HEIC",why:"The two headings are Duration and Ratio; Fixed and Variable are the sub-types under each."},
    {type:"mc",q:"Fixed duration means reinforcement is…",opts:["Presented at fixed time periods, after the dog has performed the behavior","Delivered after a specific number of responses","Given every single time","Withheld until the dog offers a new behavior"],a:0,src:"IMG_3658.HEIC",why:"That is the slide's exact definition of Duration — Fixed. A specific number of responses is the Ratio — Fixed definition."},
    {type:"mc",q:"Variable duration means the response is rewarded after…",opts:["The behavior has been performed for an unpredictable amount of time","An unpredictable number of responses","Exactly 30 seconds","The dog offers three behaviors"],a:0,src:"IMG_3658.HEIC",why:"Duration — Variable is about an unpredictable amount of time; an unpredictable number of responses is Ratio — Variable."},
    {type:"mc",q:"Fixed ratio means reinforcement is delivered after…",opts:["A specific number of responses","A fixed period of time","Every response","An unpredictable number of responses"],a:0,src:"IMG_3658.HEIC",why:"“Fixed; Reinforcement is delivered after a specific number of responses.”"},
    {type:"fib",q:"Variable ratio: the response is reinforced after an <span class='blank'>__________</span> number of responses.",acc:["unpredictable"],src:"IMG_3658.HEIC",why:"“Variable; Response is reinforced after an unpredictable number of responses.”"},
    {type:"mc",q:"What does continuous reinforcement mean?",opts:["Every time a specific action is performed the subject instantly receives a reinforcement","Reinforcement arrives on a fixed clock","Reinforcement is given at random","Reinforcement continues after training ends"],a:0,src:"IMG_3659.HEIC",why:"“Every time a specific action is performed the subject instantly receives a reinforcement.”"},
    {type:"tf",q:"Continuous reinforcement is impractical to use consistently, and behavior on it is prone to extinction.",a:true,src:"IMG_3659.HEIC",why:"Both statements appear as bullets on the Continuous Reinforcement slide."},
    {type:"fib",q:"Complete the principle: “Unpredictability in reinforcement = Greater <span class='blank'>__________</span> in behavior.”",acc:["predictability"],src:"IMG_3659.HEIC",why:"This is the bold italic line closing the Continuous Reinforcement slide."},
    {type:"mc",q:"What does a Fixed Ratio (FR) schedule produce?",opts:["A high, steady rate of response with only a brief pause after the delivery of the reinforcement","A slow, irregular rate of response","No response at all without a clicker","A response only under distraction"],a:0,src:"IMG_3660.HEIC",why:"That is the slide's description of FR — note the brief pause after reinforcement, which VR does not have."},
    {type:"tf",q:"Variable Ratio schedules produce slightly higher rates of responding than Fixed Ratio schedules.",a:true,src:"IMG_3660.HEIC",why:"“VR produce slightly higher rates of responding than FR; organism doesn't know when next reinforcement is.”"},
    {type:"fib",q:"“The higher the ratio, the higher the <span class='blank'>__________</span>.”",acc:["response","responding"],src:"IMG_3660.HEIC",why:"The final line of the Ratio Schedules slide."}
  ]

  sources:["IMG_3665.HEIC","IMG_3666.HEIC"],
  summary:"Two slides cover the biological limits on what conditioning can achieve. Instinctive drift is innate behavior pulling the dog away from learning, while taste aversion learning shows how powerfully a single sickness event can teach avoidance — illustrated by the lithium chloride coyote study, and by a failed attempt to apply the same logic to coprophagia in dogs.",
  points:[

    "The examples of instinctive drift given are chasing a squirrel, digging, swimming, and sniffing the ground.",
    "In taste aversion learning, animals learn about new foods by trial and error; if they get sick, they probably won't do it again.",
    "In the coyote study, dead sheep were laced with lithium chloride, which induces powerful nausea in coyotes.",
    "The coyote eats the sheep, becomes ill, and avoids sheep in the future.",
    "Taste aversion was tried with dogs to avoid coprophagia, using ipecac on feces.",
    "The ipecac approach was ineffective because it does not create the necessary feelings of nausea.",
    "“Medical treatments” is listed as a further context for taste aversion learning."
  ],

    {t:"Taste aversion learning (verbatim)",body:"Animals learn about new foods by trial and error\n\n    If they get sick; they probably won't do it again\n\n    Dead sheep laced with lithium chloride\n        Induces powerful nausea in coyotes\n        Coyote eats sheep; becomes ill\n        Avoids sheep in the future\n\n    Tried with dogs to avoid coprophagia\n        Ipecac on feces\n        Ineffective; does not create necessary feelings of nausea\n\n    Medical treatments"}

function blankState(){
  return {
    best:{}, seen:{}, q:{},
    scope:{mixed:"__all", drill:"__all", exam:"__all"},
    xp:{p:0, day:null, streak:0, best:0, hist:[]},
    diff:"medium",

}
function load(id){
  let s = null;
  try{
    const raw = localStorage.getItem(pkey(id));
    if(raw) s = JSON.parse(raw);
  }catch(e){}
  const d = blankState();
  if(!s) return d;
  if(!s.q) s.q = d.q;
  if(!s.best) s.best = d.best;
  if(!s.scope) s.scope = d.scope;
  if(!s.xp) s.xp = d.xp;
  if(!s.diff) s.diff = d.diff;
  if(!s.customSel) s.customSel = d.customSel;
  return s;
}
function save(){
  if(!PID) return;                                // no profile chosen → nothing to persist
  try{ localStorage.setItem(pkey(PID), JSON.stringify(state)); }catch(e){}
}
let state = blankState();

/* ============================================================
   HELPERS
   ============================================================ */
const $ = s => document.querySelector(s);
const main = $("#main");
const nav = $("#nav");

function norm(s){
  return String(s).toLowerCase().trim()
    .replace(/[‘’]/g,"'").replace(/[“”]/g,'"')
    .replace(/[.,;:!?"']/g,"").replace(/\s+/g," ");
}
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function shuffle(a){
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}
function pct(id){
  const b = state.best[id];
  if(!b || !b.total) return 0;
  return Math.round(100*b.correct/b.total);
}

/* ---- mastery: a question is mastered once answered right twice in a row ---- */
function topicMastery(t){
  // m: mastered (streak ≥2) · weak: last-wrong or error history, not mastered
  // unseen: never answered. First-time-right questions (streak 1, no errors)
  // count in none of these — they're simply in progress.
  let m = 0, weak = 0, unseen = 0;
  t.questions.forEach(q => {
    const s = state.q[q.qid];
    if(!s || !s.s) unseen++;
    else if(s.k >= 2) m++;
    else if(s.k === 0 || s.r < s.s) weak++;
  });
  return {m, weak, unseen};
}
function weakCounts(){
  let m = 0, weak = 0, unseen = 0;
  TOPICS.forEach(t => { const tm = topicMastery(t); m += tm.m; weak += tm.weak; unseen += tm.unseen; });
  return {m, weak, unseen};
}
function weakPool(scope){
  // Last-answer-wrong first, then near-misses with an error history,
  // topped up with never-seen questions. Scope: "__all", "deck:<key>", or a topic id.
  const src = topicsInScope(scope);
  const a = [], b = [], c = [];
  src.forEach(t => t.questions.forEach(q => {
    const s = state.q[q.qid];
    const qq = Object.assign({}, q, {_topic: t.title});
    if(!s || !s.s) c.push(qq);
    else if(s.k === 0) a.push(qq);
    else if(s.k < 2 && s.r < s.s) b.push(qq);
  }));
  return shuffle(a).concat(shuffle(b), shuffle(c)).slice(0, DRILL_SIZE);
}

/* ---- spaced review: mastered questions come due on widening intervals ---- */
function duePool(){
  const now = Date.now(), due = [];
  TOPICS.forEach(t => t.questions.forEach(q => {
    const s = state.q[q.qid];
    if(s && s.k >= 2 && s.due && s.due <= now) due.push(Object.assign({}, q, {_topic: t.title}));
  }));
  return shuffle(due);
}
function nextDueAt(){
  let min = null;
  TOPICS.forEach(t => t.questions.forEach(q => {
    const s = state.q[q.qid];
    if(s && s.k >= 2 && s.due && (min === null || s.due < min)) min = s.due;
  }));
  return min;
}

/* ---- topic scoping for mixed / drill / exam ----
   A scope is "__all" (both decks), "deck:<key>" (a whole deck), or a topic id. */
function scopeOf(id){ return id.includes(":") ? id.slice(id.indexOf(":")+1) : "__all"; }
function isTopicScope(scope){ return scope && scope!=="__all" && scope.slice(0,5)!=="deck:"; }
function topicsInScope(scope){
  if(!scope || scope==="__all") return TOPICS;
  if(scope.slice(0,5)==="deck:"){ const d = scope.slice(5); return TOPICS.filter(t=>t.deck===d); }
  return TOPICS.filter(t=>t.id===scope);
}
function scopeLabel(scope){
  if(!scope || scope==="__all") return "All topics";
  if(scope.slice(0,5)==="deck:"){ const dk = DECKS.find(d=>d.key===scope.slice(5)); return dk ? dk.name : "All topics"; }
  const t = TOPICS.find(x=>x.id===scope); return t ? t.title : "All topics";
}
function scopeQCount(scope){ return topicsInScope(scope).reduce((n,t)=>n+t.questions.length,0); }

function topicScopeSelect(selId, sel){
  let html = '<select id="'+selId+'" class="scopesel">'+
    '<option value="__all"'+(sel==="__all"?" selected":"")+'>All topics (both decks)</option>';
  DECKS.forEach(dk=>{
    const group = TOPICS.filter(t=>t.deck===dk.key);
    if(!group.length) return;
    html += '<optgroup label="'+esc(dk.name)+'">';
    html += '<option value="deck:'+dk.key+'"'+(sel==="deck:"+dk.key?" selected":"")+'>All '+esc(dk.name)+'</option>';
    group.forEach(t=> html += '<option value="'+t.id+'"'+(sel===t.id?" selected":"")+'>'+esc(SHORT[t.id]||t.title)+'</option>');
    html += '</optgroup>';
  });
  return html + '</select>';
}
function drawMixed(scope){
  const pool = [];
  topicsInScope(scope).forEach(t=> t.questions.forEach(q=> pool.push(Object.assign({},q,{_topic:t.title}))));
  return shuffle(pool).slice(0, MIXED_SIZE);
}

/* ============================================================
   XP, RANKS & DAILY STREAK
   The reward schedule follows the deck's own lesson: reinforcement
   only, never punishment (a wrong answer costs nothing — excessive
   punishment is what the Learned Helplessness slide warns about),
   plus a variable-ratio bonus, the schedule the Ratio Schedules
   slide says produces the highest rate of responding.
   ============================================================ */
const RANKS = ["Trainee","Student Handler","Handler","Certified Handler","Skilled Trainer",
               "Behavior Specialist","Senior Trainer","Master Trainer","Head of Training","Canine Behaviorist"];
const XP_CURVE = 80;                                    // xp needed for level n = 80*(n-1)^2
function xpForLevel(n){ return XP_CURVE*(n-1)*(n-1); }
function levelOf(p){ return Math.min(RANKS.length, Math.floor(Math.sqrt(p/XP_CURVE))+1); }

function dayKey(d){
  const t = d || new Date();
  return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
}
function dayShift(n){ const d = new Date(); d.setDate(d.getDate()+n); return dayKey(d); }

// Called on every answer. Returns true the first time it runs on a new day.
function touchStreak(){
  const x = state.xp, today = dayKey();
  if(x.day === today) return false;
  x.streak = (x.day === dayShift(-1)) ? x.streak+1 : 1;
  x.day = today;
  if(x.streak > x.best) x.best = x.streak;
  x.hist = (x.hist||[]).filter(d=>d!==today).concat(today).slice(-14);
  return true;
}

// Quiet mode batches gains so exam mode leaks no right/wrong signal
// before the results screen, and rapid rounds don't spray toasts.
let xpQuiet = false, xpBatch = 0;
function awardXP(n, kind, label){
  if(n <= 0) return;
  state.xp.p += n;
  if(xpQuiet){ xpBatch += n; return; }
  toast("+"+n+" XP"+(label? " · "+label : ""), kind);
}
function checkLevelUp(before){
  const now = levelOf(state.xp.p);
  if(now > before) toast("Level "+now+"<b>"+RANKS[now-1]+"</b>", "up", 3200);
  return now;
}

function toast(html, kind, ms){
  const box = $("#toasts");
  if(!box) return;
  const el = document.createElement("div");
  el.className = "toast" + (kind? " "+kind : "");
  el.innerHTML = html;
  box.appendChild(el);
  setTimeout(()=>{ el.style.opacity = "0"; setTimeout(()=>el.remove(), 300); }, ms || 1900);
  while(box.children.length > 4) box.firstChild.remove();
}

function renderXP(){
  const x = state.xp, lv = levelOf(x.p);
  const base = xpForLevel(lv), next = xpForLevel(lv+1);
  const capped = lv >= RANKS.length;
  $("#xplvl").textContent = "LVL "+lv;
  $("#xprank").textContent = RANKS[lv-1];
  $("#xpfill").style.width = (capped ? 100 : Math.round(100*(x.p-base)/(next-base)))+"%";
  $("#xpmeta").textContent = capped ? x.p+" XP · MAX" : (x.p-base)+"/"+(next-base)+" XP";
  $("#xpmeta").title = capped ? "Maximum rank reached" : (next-x.p)+" XP to level "+(lv+1);

  const live = x.day === dayKey() || x.day === dayShift(-1);
  const fl = $("#xpstreak");
  fl.textContent = (x.streak && live) ? "🔥 "+x.streak+"d" : (x.best? "best "+x.best+"d" : "no streak");
  fl.className = "flame" + ((x.streak>1 && live) ? " hot" : "");
  fl.title = x.best ? "Longest streak: "+x.best+" days" : "";

  const hist = new Set(x.hist||[]);
  $("#xpdots").innerHTML = [6,5,4,3,2,1,0].map(n=>{
    const d = dayShift(-n);
    return '<span class="dot'+(hist.has(d)?" on":"")+(n===0?" now":"")+'" title="'+d+'"></span>';
  }).join("");
}

const PF_EMO = ["🐕","🦮","🐩","🐕‍🦺","🐺","🦊","🐾","🎾"];
const PF_BG  = ["rgba(62,203,224,.16)","rgba(89,227,179,.16)","rgba(167,139,250,.16)","rgba(255,179,92,.16)",

const pfBg = p => PF_BG[(p.bg||0) % PF_BG.length];

function pfStats(id){
  let s = null;
  try{ s = JSON.parse(localStorage.getItem(pkey(id)) || "null"); }catch(e){}
  if(!s) return {lv:1, mastered:0, streak:0, fresh:true};
  const xp = (s.xp && s.xp.p) || 0;
  return {
    lv: levelOf(xp),
    mastered: Object.values(s.q || {}).filter(v => v && v.k >= 2).length,
    streak: (s.xp && s.xp.streak) || 0,
    fresh: !s.q || !Object.keys(s.q).length
  };
}

// One-time rescue of progress made before profiles existed.
function migrateLegacy(){
  if(REG.list.length) return;
  let old = null;
  try{ old = JSON.parse(localStorage.getItem(LEGACY) || "null"); }catch(e){}
  if(!old || !old.q || !Object.keys(old.q).length) return;   // nothing worth keeping
  const id = "p" + Date.now().toString(36);
  REG.list.push({id, name:"My progress", emoji:PF_EMO[0], bg:0});
  REG.last = id;
  try{ localStorage.setItem(pkey(id), JSON.stringify(old)); }catch(e){}
  saveReg();                                                  // legacy key left untouched as a backup
}

function pfChip(){
  const p = REG.list.find(x => x.id === PID);
  if(!p) return;
  $("#pfav").textContent = p.emoji;
  $("#pfav").style.background = pfBg(p);
  $("#pfnm").textContent = p.name;
}

function enterProfile(id){
  const p = REG.list.find(x => x.id === id);
  if(!p) return;
  PID = id;
  state = load(id);
  REG.last = id; saveReg();
  document.body.classList.remove("noprofile");
  pfChip();
  if(duePool().length){ current = "__due"; showDueIntro(); }
  else showTopic(TOPICS[0].id);
}

function showProfiles(){
  stopExamTimer();
  save();                                    // flush the outgoing profile before switching
  PID = null;
  document.body.classList.add("noprofile");
  closeMenu();

  const cards = REG.list.map(p => {
    const st = pfStats(p.id);
    const line = st.fresh ? "not started"
      : "LVL " + st.lv + " · " + st.mastered + " mastered" + (st.streak > 1 ? " · 🔥" + st.streak : "");
    // A div, not a button: the rename/delete controls are real buttons and the
    // HTML parser refuses to nest them inside one, hoisting them out of the card.
    return '<div class="pfcard" role="button" tabindex="0" data-pid="'+p.id+'" aria-label="'+esc(p.name)+'">'+
      '<span class="av" style="background:'+pfBg(p)+'">'+p.emoji+'</span>'+
      '<b>'+esc(p.name)+'</b><small>'+esc(line)+'</small>'+
      '<span class="pftools">'+
        '<button class="pftool" data-ren="'+p.id+'" title="Rename">✏️</button>'+
        '<button class="pftool" data-del="'+p.id+'" title="Delete">🗑️</button>'+
      '</span></div>';
  }).join("");

  main.innerHTML =
    '<div class="pfwrap">'+
      '<div class="kicker">Who’s studying?</div>'+
      '<h1>Choose a profile</h1>'+
      '<p class="summary">Each profile keeps its own mastery record, review schedule, XP and streak on this device — so more than one person can work through the deck without mixing up progress.</p>'+
      '<div class="pfgrid" id="pfgrid">'+cards+
        '<button class="pfcard new" id="pfnew"><span class="av">＋</span><b>New profile</b><small>start fresh</small></button>'+
      '</div>'+
      (REG.list.length ? '<button class="pfmanage" id="pfmanage">Manage profiles</button>' : '')+
    '</div>';

  const grid = $("#pfgrid");
  grid.querySelectorAll(".pfcard[data-pid]").forEach(c=>{
    c.onclick = e=>{
      const ren = e.target.closest("[data-ren]"), del = e.target.closest("[data-del]");
      if(ren){ pfNameModal(REG.list.find(x=>x.id===ren.dataset.ren)); return; }
      if(del){ pfDeleteModal(REG.list.find(x=>x.id===del.dataset.del)); return; }
      if(grid.classList.contains("editing")) return;
      enterProfile(c.dataset.pid);
    };
    c.onkeydown = e=>{                                  // div needs explicit keyboard activation
      if(e.target !== c) return;
      if(e.key === "Enter" || e.key === " "){ e.preventDefault(); c.onclick(e); }
    };
  });
  $("#pfnew").onclick = ()=> pfNameModal(null);
  if($("#pfmanage")) $("#pfmanage").onclick = ()=>{
    grid.classList.toggle("editing");
    $("#pfmanage").textContent = grid.classList.contains("editing") ? "Done" : "Manage profiles";
  };
  window.scrollTo(0,0);
}

/* ---- modal ---- */
function closeModal(){ $("#modal").innerHTML = ""; }
function openModal(html, onOpen){

  root.querySelector(".ovl").addEventListener("click", e=>{

function pfNameModal(p){                       // p === null → create a new profile
  let emo = p ? p.emoji : PF_EMO[REG.list.length % PF_EMO.length];
  openModal(
    '<h3>'+(p ? "Rename profile" : "New profile")+'</h3>'+
    '<p>'+(p ? "Progress stays exactly where it is." : "Pick a name and an icon. Your mastery, streak and review queue start fresh.")+'</p>'+
    '<input id="pfin" maxlength="18" placeholder="e.g. Rémi" value="'+(p ? esc(p.name).replace(/"/g,"&quot;") : "")+'">'+
    '<div class="emopick" id="emopick">'+PF_EMO.map(x=>
      '<button data-e="'+x+'"'+(x===emo?' class="sel"':'')+'>'+x+'</button>').join("")+'</div>'+
    '<button class="btn" id="pfsave">'+(p ? "Save" : "Start studying")+'</button>'+
    '<button class="mcancel" id="pfcancel">Cancel</button>',
  ()=>{
    const inp = $("#pfin");
    inp.focus(); inp.select();
    $("#emopick").querySelectorAll("button").forEach(b=>{
      b.onclick = ()=>{
        emo = b.dataset.e;
        $("#emopick").querySelectorAll("button").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel");
      };
    });
    const commit = ()=>{
      const n = inp.value.trim();
      if(!n){ inp.focus(); return; }
      if(REG.list.some(x=> x.name.toLowerCase()===n.toLowerCase() && x!==p)){
        toast("That name is already used on this device", "streak", 2400); return;
      }
      if(p){
        p.name = n; p.emoji = emo; saveReg(); closeModal();
        if(PID === p.id) pfChip();
        showProfiles();
      } else {
        const id = "p" + Date.now().toString(36);
        REG.list.push({id, name:n, emoji:emo, bg:REG.list.length % PF_BG.length});
        saveReg(); closeModal();
        enterProfile(id);
        toast("Welcome, "+esc(n)+" 🐾", null, 2600);
      }
    };
    $("#pfsave").onclick = commit;
    inp.addEventListener("keydown", e=>{ if(e.key === "Enter") commit(); });
    $("#pfcancel").onclick = closeModal;
  });
}

function pfDeleteModal(p){
  const st = pfStats(p.id);
  openModal(
    '<h3>Delete '+esc(p.name)+'?</h3>'+
    '<p>'+(st.fresh ? "This profile hasn’t answered anything yet, so there’s nothing to lose."
      : st.mastered ? "Their "+st.mastered+" mastered question"+(st.mastered===1?"":"s")+", review schedule, XP and streak on this device will be gone for good."
      : "Their progress, XP and streak on this device will be gone for good.")+'</p>'+
    '<button class="btn danger" id="pfdel">Delete profile</button>'+
    '<button class="mcancel" id="pfkeep">Keep it</button>',
  ()=>{
    $("#pfdel").onclick = ()=>{
      try{ localStorage.removeItem(pkey(p.id)); }catch(e){}
      REG.list = REG.list.filter(x=>x.id !== p.id);
      if(REG.last === p.id) REG.last = null;
      if(PID === p.id){ PID = null; state = blankState(); }
      saveReg(); closeModal(); showProfiles();
      toast("Profile deleted", "streak", 2200);
    };
    $("#pfkeep").onclick = closeModal;
  });
}

/* ============================================================
   PROGRESS TRANSFER — move a profile between devices with a
   copy-paste code. No account, no server.
   ============================================================ */
function encodeProgress(){
  const me = REG.list.find(p=>p.id===PID) || {name:"Profile", emoji:"🐕"};
  const payload = {v:1, name:me.name, emoji:me.emoji, state:state};
  return "TC1:" + btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
}
function decodeProgress(code){
  code = (code||"").trim();
  if(code.slice(0,4) !== "TC1:") return null;
  try{
    const obj = JSON.parse(decodeURIComponent(escape(atob(code.slice(4)))));
    if(!obj || !obj.state || typeof obj.state !== "object" || !obj.state.q) return null;
    return obj;
  }catch(e){ return null; }
}
function progressSummary(st){
  const xp = (st.xp && st.xp.p) || 0;
  const mastered = Object.values(st.q || {}).filter(v=>v && v.k >= 2).length;
  return "Level " + levelOf(xp) + " · " + mastered + " of " + TOTAL_Q + " mastered";
}
function openTransferModal(){
  openModal(
    '<h3>Transfer progress</h3>'+
    '<p>Move this profile between devices — laptop to phone, or into the standalone apps — with a code. No account needed.</p>'+
    '<div class="xfertabs"><button data-tab="out" class="on">Copy this device</button><button data-tab="in">Paste a code</button></div>'+
    '<div id="xfer-out">'+
      '<textarea class="xferbox" id="xfercode" readonly></textarea>'+
      '<button class="btn" id="xfercopy" style="width:100%">Copy code</button>'+
    '</div>'+
    '<div id="xfer-in" style="display:none">'+
      '<textarea class="xferbox" id="xferin" placeholder="Paste a transfer code from another device…"></textarea>'+
      '<div class="xfermsg" id="xfermsg"></div>'+
      '<button class="btn" id="xferload" style="width:100%" disabled>Load into this profile</button>'+
    '</div>'+
    '<button class="mcancel" id="xferclose">Close</button>',
  ()=>{
    $("#xfercode").value = encodeProgress();
    const tabs = $("#modal").querySelectorAll(".xfertabs button");
    tabs.forEach(b=> b.onclick = ()=>{
      tabs.forEach(x=>x.classList.remove("on")); b.classList.add("on");
      $("#xfer-out").style.display = b.dataset.tab==="out" ? "" : "none";
      $("#xfer-in").style.display  = b.dataset.tab==="in"  ? "" : "none";
    });
    $("#xfercopy").onclick = ()=>{
      const ta = $("#xfercode"); ta.select(); ta.setSelectionRange(0, 99999);
      const done = ()=> toast("Code copied 📋", null, 1800);
      if(navigator.clipboard) navigator.clipboard.writeText(ta.value).then(done, ()=>{ document.execCommand("copy"); done(); });
      else { document.execCommand("copy"); done(); }
    };
    let pending = null;
    $("#xferin").oninput = ()=>{
      const raw = $("#xferin").value.trim();
      const msg = $("#xfermsg"), btn = $("#xferload");
      if(!raw){ msg.className="xfermsg"; msg.textContent=""; pending=null; btn.disabled=true; return; }
      const dec = decodeProgress(raw);
      if(dec){ pending=dec; msg.className="xfermsg ok"; msg.textContent="Valid code — "+esc(dec.name)+": "+progressSummary(dec.state); btn.disabled=false; }
      else { pending=null; msg.className="xfermsg bad"; msg.textContent="That doesn't look like a valid transfer code."; btn.disabled=true; }
    };
    $("#xferload").onclick = ()=>{
      if(!pending) return;
      if(!confirm("Load this progress into the current profile?\n\nIt replaces this device's progress for this profile. Other profiles are untouched.")) return;
      state = Object.assign(blankState(), pending.state);
      save(); closeModal();
      if(duePool().length){ current="__due"; showDueIntro(); } else { current=TOPICS[0].id; showTopic(current); }
      renderNav();
      toast("Progress loaded ✓", "up", 2600);
    };
    $("#xferclose").onclick = closeModal;
  });
}

/* ============================================================
   CUSTOM QUIZ BUILDER — tick whole topics or individual
   sub-sections across both decks and mix them into one quiz.
   ============================================================ */
function selKey(tid, sec){ return tid + "||" + sec; }
function customCount(){
  const sel = state.customSel || {};
  let n = 0;
  TOPICS.forEach(t => t.questions.forEach(q=>{ if(sel[selKey(t.id, q.sec)]) n++; }));
  return n;
}
function buildCustomPool(){
  const sel = state.customSel || {};
  const pool = [];
  TOPICS.forEach(t => t.questions.forEach(q=>{ if(sel[selKey(t.id, q.sec)]) pool.push(Object.assign({}, q, {_topic:t.title})); }));
  return shuffle(pool);
}

function showBuilder(){
  stopExamTimer();
  current = "__custom";
  const sel = state.customSel || (state.customSel = {});

  DECKS.forEach(dk=>{
    const group = TOPICS.filter(t=>t.deck===dk.key);
    if(!group.length) return;
    html += '<div class="bdeck"><div class="bdeckname">'+esc(dk.name)+'</div>';
    group.forEach(t=>{
      const secs = topicSections(t);
      const someOn = secs.some(s=> sel[selKey(t.id,s.name)]);
      html += '<div class="btopic" data-topic="'+t.id+'">'+
        '<div class="brow btop">'+
          '<button class="bcaret" data-toggle="'+t.id+'" aria-label="Expand">▶</button>'+
          '<input type="checkbox" class="tchk" data-t="'+t.id+'">'+
          '<span class="bname" data-toggle="'+t.id+'">'+esc(SHORT[t.id]||t.title)+'</span>'+
          '<span class="bcount">'+t.questions.length+' q</span>'+
        '</div>'+
        '<div class="bsecs">'+
          secs.map(s=>
            '<label class="brow bsec"><input type="checkbox" class="schk" data-t="'+t.id+'" data-s="'+esc(s.name).replace(/"/g,"&quot;")+'"'+(sel[selKey(t.id,s.name)]?" checked":"")+'>'+
            '<span class="bname">'+esc(s.name)+'</span><span class="bcount">'+s.n+'</span></label>'
          ).join("")+
        '</div>'+
      '</div>';
      if(someOn){ /* topic starts expanded if it has selections */ }
    });
    html += '</div>';
  });
  html += '</div>'+
    diffRow()+
    '<div class="btnrow builderbar">'+
      '<button class="btn" id="startcustom">Start custom quiz · <span id="bselcount">0</span> questions</button>'+
      '<button class="btn ghost" id="bclear">Clear selection</button>'+
    '</div>';
  main.innerHTML = html;

  // reflect the topic-level checkbox state (checked / indeterminate / empty)
  function syncTopic(tid){
    const secs = topicSections(TOPICS.find(t=>t.id===tid));
    const on = secs.filter(s=> sel[selKey(tid,s.name)]).length;
    const box = main.querySelector('.tchk[data-t="'+tid+'"]');
    box.checked = on === secs.length && on > 0;
    box.indeterminate = on > 0 && on < secs.length;
    // open the section list if partially/fully selected
    if(on > 0) main.querySelector('.btopic[data-topic="'+tid+'"]').classList.add("open");
  }
  function refresh(){
    const n = customCount();
    $("#bselcount").textContent = n;
    $("#startcustom").disabled = n === 0;
  }
  TOPICS.forEach(t=> syncTopic(t.id));
  refresh();

  // expand / collapse
  main.querySelectorAll("[data-toggle]").forEach(el=> el.onclick = e=>{
    e.preventDefault();
    main.querySelector('.btopic[data-topic="'+el.dataset.toggle+'"]').classList.toggle("open");
  });
  // section checkbox
  main.querySelectorAll(".schk").forEach(cb=> cb.onchange = ()=>{
    const k = selKey(cb.dataset.t, cb.dataset.s);
    if(cb.checked) sel[k] = true; else delete sel[k];
    save(); syncTopic(cb.dataset.t); refresh(); renderNav();
  });
  // topic checkbox → select / clear all its sections
  main.querySelectorAll(".tchk").forEach(cb=> cb.onchange = ()=>{
    const tid = cb.dataset.t;
    const secs = topicSections(TOPICS.find(t=>t.id===tid));
    secs.forEach(s=>{ const k=selKey(tid,s.name); if(cb.checked) sel[k]=true; else delete sel[k]; });
    main.querySelectorAll('.schk[data-t="'+tid+'"]').forEach(x=> x.checked = cb.checked);
    save(); syncTopic(tid); refresh(); renderNav();
  });

  $("#startcustom").onclick = ()=>{ if(customCount()) startQuiz(buildCustomPool(), "__custom", "Custom quiz", true); };
  $("#bclear").onclick = ()=>{ state.customSel = {}; save(); showBuilder(); };
  wireDiff(showBuilder);
  renderNav();
  window.scrollTo(0,0);
}
