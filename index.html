let rapid = null;
function startRapid(){
  rapid = {items: shuffle(RAPID), i:0, right:0, misses:{}, t0: Date.now(), lv0: levelOf(state.xp.p)};
  xpQuiet = true; xpBatch = 0;          // batch gains; one summary toast at the end
  renderRapid();
  window.scrollTo(0,0);
}
function renderRapid(){
  const it = rapid.items[rapid.i];
  const c = CONFUSABLES.find(x=>x.id===it.cid);
  main.innerHTML =
    '<div class="qhead"><div class="kicker" style="margin:0">Rapid round</div>'+
    '<div class="qcount">'+(rapid.i+1)+' of '+rapid.items.length+' · '+rapid.right+' right</div></div>'+
    '<div class="qbar"><i style="width:'+Math.round(100*rapid.i/rapid.items.length)+'%"></i></div>'+
    '<div class="qtype">Which is it?</div>'+
    '<p class="qtext">“'+esc(it.text)+'”</p>'+
    '<div class="opts">'+
      '<button class="opt" data-s="L"><span class="key">1</span><span>'+esc(c.l.name)+'</span></button>'+
      '<button class="opt" data-s="R"><span class="key">2</span><span>'+esc(c.r.name)+'</span></button>'+
    '</div>';
  main.querySelectorAll(".opt").forEach(b=>{
    b.onclick = ()=>{
      const ok = b.dataset.s === it.side;
      if(ok){ rapid.right++; touchStreak(); awardXP(5); renderXP(); }
      else rapid.misses[it.cid] = (rapid.misses[it.cid]||0)+1;
      main.querySelectorAll(".opt").forEach(x=>{
        x.disabled = true;
        if(x.dataset.s===it.side) x.classList.add("correct");
        else if(x===b && !ok) x.classList.add("wrong");
      });
      setTimeout(()=>{ rapid.i++; rapid.i < rapid.items.length ? renderRapid() : rapidResult(); }, ok? 350 : 950);
    };
  });
}
function rapidResult(){
  const ms = Date.now() - rapid.t0;
  const total = rapid.items.length;
  xpQuiet = false;
  if(xpBatch > 0){ toast("+"+xpBatch+" XP · rapid round", null, 2600); xpBatch = 0; }
  checkLevelUp(rapid.lv0);
  save();
  const prev = state.rapid;
  if(!prev || rapid.right > prev.score || (rapid.right === prev.score && ms < prev.ms)){
    state.rapid = {score: rapid.right, total: total, ms: ms}; save();
  }
  const missed = Object.keys(rapid.misses);
  main.innerHTML = '<div class="result">'+
    '<div class="score">'+rapid.right+'<span style="color:var(--muted);font-size:.5em">/'+total+'</span></div>'+
    '<div class="pct">'+Math.round(ms/1000)+' seconds</div>'+
    '<div class="msg">'+esc(missed.length? 'Mixed up: '+missed.map(id=>CONFUSABLES.find(c=>c.id===id).title).join(' · ')+'. Re-read those cards.' : 'Clean calls across the board.')+'</div>'+
    '<div class="btnrow"><button class="btn" id="rapidagain">Run it again</button>'+
    '<button class="btn ghost" id="rapidback">Back to the cards</button></div></div>';
  $("#rapidagain").onclick = startRapid;
  $("#rapidback").onclick = showConfusables;
  renderNav(); window.scrollTo(0,0);
}

/* ============================================================
   KNOWLEDGE MAP — every question as a point on a rotating sphere,
   grouped into per-topic constellations, lit by your real state.
   Hand-rolled 3D projection: no library, no external assets.
   ============================================================ */
const SKY_COL = {
  unseen:  {c:"#41556b", glow:0,   label:"Never seen"},
  learning:{c:"#3ecbe0", glow:6,   label:"Learning · 1 right"},
  weak:    {c:"#f2606a", glow:6,   label:"Needs work"},
  due:     {c:"#ffd97d", glow:10,  label:"Due for review"},
  mastered:{c:"#59e3b3", glow:12,  label:"Mastered"}
};
function nodeState(qid){
  const s = state.q[qid];
  if(!s || !s.s) return "unseen";
  if(s.k >= 2)   return (s.due && s.due <= Date.now()) ? "due" : "mastered";
  if(s.k === 0 || s.r < s.s) return "weak";
  return "learning";
}

function showMap(){
  current = "__map";
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // Each topic gets its own cap on the sphere, so the nine topics read as
  // nine distinct constellations rather than one interleaved web.
  const GA = Math.PI * (3 - Math.sqrt(5)), CAP = 0.40;   // cap radius in radians
  const nodes = [];
  TOPICS.forEach((t, ti) => {
    // topic centre, spread evenly via Fibonacci sphere
    const cy0 = 1 - ((ti + 0.5) / TOPICS.length) * 2;      // inset: never lands on a pole
    const cr  = Math.sqrt(Math.max(0, 1 - cy0*cy0));
    const cth = GA * ti;
    const C = [Math.cos(cth) * cr, cy0, Math.sin(cth) * cr];
    // orthonormal basis (u, v) perpendicular to C
    const ref = Math.abs(C[1]) < 0.9 ? [0,1,0] : [1,0,0];
    let u = [C[1]*ref[2]-C[2]*ref[1], C[2]*ref[0]-C[0]*ref[2], C[0]*ref[1]-C[1]*ref[0]];
    let ul = Math.hypot(u[0],u[1],u[2]); u = u.map(x=>x/ul);
    const v = [C[1]*u[2]-C[2]*u[1], C[2]*u[0]-C[0]*u[2], C[0]*u[1]-C[1]*u[0]];
    const n = t.questions.length;
    t.questions.forEach((q, j) => {
      const a = GA * j;                                  // deterministic sunflower packing
      const rr = CAP * Math.sqrt((j + 0.5) / n);
      const sr = Math.sin(rr), cs = Math.cos(rr);
      nodes.push({
        ti, tid:t.id, title:t.title, qid:q.qid,
        px: C[0]*cs + (u[0]*Math.cos(a) + v[0]*Math.sin(a)) * sr,
        py: C[1]*cs + (u[1]*Math.cos(a) + v[1]*Math.sin(a)) * sr,
        pz: C[2]*cs + (u[2]*Math.cos(a) + v[2]*Math.sin(a)) * sr
      });
    });
  });
  const N = nodes.length;

  // Constellation edges: link each star to its two nearest neighbours in the
  // same topic. Short, tidy lines that trace each cluster's shape.
  const edges = [];
  TOPICS.forEach((t, ti) => {
    const grp = nodes.map((n,i)=>({n,i})).filter(o=>o.n.ti===ti);
    const seen = new Set();
    grp.forEach(o => {
      const d = grp.filter(p=>p!==o).map(p=>({p, d:Math.hypot(p.n.px-o.n.px, p.n.py-o.n.py, p.n.pz-o.n.pz)}))
                   .sort((a,b)=>a.d-b.d).slice(0,2);
      d.forEach(({p}) => {
        const key = Math.min(o.i,p.i)+"-"+Math.max(o.i,p.i);
        if(!seen.has(key)){ seen.add(key); edges.push([o.i, p.i]); }
      });
    });
  });

  const counts = {unseen:0, learning:0, weak:0, due:0, mastered:0};
  nodes.forEach(n => counts[nodeState(n.qid)]++);

  main.innerHTML =
    '<div class="kicker">Knowledge map</div>'+
    '<h1>Your constellation</h1>'+
    '<p class="summary">All '+N+' questions, one point each, grouped into a constellation per topic. '+
      'Every point is lit by how you are actually doing with it — so the dark patches are exactly where the work is.</p>'+
    '<div class="skywrap">'+
      '<canvas id="sky"></canvas>'+
      '<div class="skytip" id="skytip"></div>'+
      '<button class="skyspin" id="skyspin">'+(reduce ? "▶ SPIN" : "❚❚ PAUSE")+'</button>'+
      '<div class="skyhint">DRAG TO ROTATE · CLICK A STAR</div>'+
    '</div>'+
    '<div class="legend">'+Object.keys(SKY_COL).map(k=>
      '<span><i style="background:'+SKY_COL[k].c+'"></i>'+SKY_COL[k].label+' · '+counts[k]+'</span>').join("")+
    '</div>'+
    '<div class="mapstat">'+
      '<div><b>'+counts.mastered+'</b><small>mastered</small></div>'+
      '<div><b>'+counts.due+'</b><small>due now</small></div>'+
      '<div><b>'+(counts.weak+counts.learning)+'</b><small>in progress</small></div>'+
      '<div><b>'+counts.unseen+'</b><small>untouched</small></div>'+
    '</div>';

  const cv = $("#sky"), ctx = cv.getContext("2d"), tip = $("#skytip");
  let rot = 0.6, tilt = -0.32, drag = null, spin = reduce ? 0 : 0.0022, hover = null;

  function size(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = cv.clientWidth * dpr; cv.height = cv.clientHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  size();
  window.addEventListener("resize", size);

  const CAM = 3.4;
  function project(n, cx, cy, R){
    const cr = Math.cos(rot), sr = Math.sin(rot);
    const x1 =  n.px * cr - n.pz * sr;
    const z1 =  n.px * sr + n.pz * cr;
    const ct = Math.cos(tilt), st = Math.sin(tilt);
    const y1 =  n.py * ct - z1 * st;
    const z2 =  n.py * st + z1 * ct;
    const p  =  CAM / (CAM - z2);
    return {x: cx + x1 * R * p, y: cy + y1 * R * p, z: z2, p};
  }

  function frame(){
    if(!document.body.contains(cv)) return;          // view changed → stop the loop
    const w = cv.clientWidth, h = cv.clientHeight;
    const cx = w/2, cy = h/2, R = Math.min(w, h) * 0.40;
    ctx.clearRect(0, 0, w, h);
    if(!drag) rot += spin;

    const pts = nodes.map(n => {
      const pr = project(n, cx, cy, R);
      return {n, pr, st: nodeState(n.qid)};
    });

    // constellation lines (drawn behind the stars)
    ctx.lineWidth = 1;
    edges.forEach(([i, j])=>{
      const a = pts[i], b = pts[j];
      const depth = (a.pr.z + b.pr.z) / 2;
      ctx.strokeStyle = "rgba(120,175,205," + (0.06 + 0.16 * (depth + 1) / 2).toFixed(3) + ")";
      ctx.beginPath(); ctx.moveTo(a.pr.x, a.pr.y); ctx.lineTo(b.pr.x, b.pr.y); ctx.stroke();
    });

    pts.sort((a, b) => a.pr.z - b.pr.z);             // painter's algorithm: back to front
    pts.forEach(p => {
      const col = SKY_COL[p.st];
      const near = (p.pr.z + 1) / 2;                 // 0 = far side, 1 = near side
      const rad = (p.st === "unseen" ? 1.9 : 2.6) * p.pr.p;
      ctx.globalAlpha = 0.30 + 0.70 * near;
      if(col.glow){
        ctx.shadowBlur = col.glow * p.pr.p;
        ctx.shadowColor = col.c;
      }
      ctx.fillStyle = col.c;
      ctx.beginPath(); ctx.arc(p.pr.x, p.pr.y, rad, 0, 6.284); ctx.fill();
      ctx.shadowBlur = 0;
      if(hover && hover.qid === p.n.qid){
        ctx.globalAlpha = 1;
        ctx.strokeStyle = "#e9f0f8"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(p.pr.x, p.pr.y, rad + 4, 0, 6.284); ctx.stroke();
      }
    });
    ctx.globalAlpha = 1;
    cv.__pts = pts;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function pick(ev){
    const r = cv.getBoundingClientRect();
    const mx = ev.clientX - r.left, my = ev.clientY - r.top;
    let best = null, bd = 14;
    (cv.__pts || []).forEach(p => {
      const d = Math.hypot(p.pr.x - mx, p.pr.y - my);
      if(d < bd && p.pr.z > -0.85){ bd = d; best = p; }   // ignore points on the far side
    });
    return best;
  }

  cv.addEventListener("pointerdown", e=>{
    drag = {x:e.clientX, y:e.clientY, rot, tilt, moved:false};
    cv.classList.add("grabbing"); cv.setPointerCapture(e.pointerId);
  });
  cv.addEventListener("pointermove", e=>{
    if(drag){
      const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
      if(Math.abs(dx) + Math.abs(dy) > 3) drag.moved = true;
      rot  = drag.rot + dx * 0.008;
      tilt = Math.max(-1.2, Math.min(1.2, drag.tilt + dy * 0.006));
      return;
    }
    const p = pick(e);
    hover = p ? p.n : null;
    if(p){
      const s = state.q[p.n.qid], st = SKY_COL[p.st];
      tip.innerHTML = '<b>'+esc(p.n.title)+'</b>'+st.label+
        (s && s.s ? ' · seen '+s.s+'×' : '');
      tip.style.left = p.pr.x + "px"; tip.style.top = p.pr.y + "px";
      tip.classList.add("on");
    } else tip.classList.remove("on");
  });
  const endDrag = e=>{
    if(drag && !drag.moved){
      const p = pick(e);
      if(p){ current = p.n.tid; showTopic(p.n.tid); return; }   // click a star → open its topic
    }
    drag = null; cv.classList.remove("grabbing");
  };
  cv.addEventListener("pointerup", endDrag);
  cv.addEventListener("pointercancel", ()=>{ drag = null; cv.classList.remove("grabbing"); });
  cv.addEventListener("pointerleave", ()=>{ hover = null; tip.classList.remove("on"); });

  // Motion defaults to the OS preference, but stays an explicit opt-in either way.
  $("#skyspin").onclick = ()=>{
    spin = spin ? 0 : 0.0022;
    $("#skyspin").textContent = spin ? "❚❚ PAUSE" : "▶ SPIN";
  };

  renderNav();
  window.scrollTo(0,0);
}

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
let quiz = null;

/* ============================================================
   DIFFICULTY — Easy / Medium / Hard.
   Never changes the facts, only recognition vs. recall:
   · Easy   — fill-ins become multiple-choice (distractors are
              REAL terms from the deck, never invented) + a hint.
   · Medium — the deck exactly as authored.
   · Hard   — direct-answer questions become type-the-answer recall.
   ============================================================ */
const DIFF_HINT = {
  easy:   "Multiple-choice only, with a hint button — recognition, not recall.",
  medium: "The deck exactly as written — a mix of choice, true/false and fill-in.",
  hard:   "Direct questions turn into type-the-answer recall. No hints."
};
const TI = Object.fromEntries(TOPICS.map((t,i)=>[t.id,i]));
function qTopicIndex(q){ const k=(q.qid||"").split("#")[0]; return (k in TI)?TI[k]:-1; }
function isShortTerm(s){ const w=String(s).trim(); return w.length<=30 && w.split(/\s+/).length<=4; }

// Pool of real, short answer terms from the whole deck — the only source
// of wrong options in Easy mode, so nothing is ever fabricated.
let DISTRACTORS = null;
function distractorPool(){
  if(DISTRACTORS) return DISTRACTORS;
  const seen = new Set(); DISTRACTORS = [];
  TOPICS.forEach((t, ti)=> t.questions.forEach(q=>{
    const terms = q.type==="mc" ? q.opts : q.type==="fib" ? [q.acc[0]] : [];
    terms.forEach(term=>{
      if(!isShortTerm(term)) return;
      const key = norm(term);
      if(!key || seen.has(key)) return;
      seen.add(key); DISTRACTORS.push({term, ti, key});
    });
  }));
  return DISTRACTORS;
}
function relatedWord(a, b){          // near-duplicate guard (pavlov / pavlovian)
  const x = norm(a), y = norm(b);
  return x===y || (x.length>3 && y.length>3 && (x.includes(y) || y.includes(x)));
}

// Answers of the OTHER fill-ins in the same topic. A sibling fill-in's answer
// can be a true completion of this blank too — never use one as a wrong option.
let FIB_TOPIC = null;
function fibAnswersByTopic(){
  if(FIB_TOPIC) return FIB_TOPIC;
  FIB_TOPIC = {};
  TOPICS.forEach((t, ti)=>{
    FIB_TOPIC[ti] = t.questions.filter(q=>q.type==="fib").map(q=>({qid:q.qid, accs:q.acc.map(norm)}));
  });
  return FIB_TOPIC;
}

function mcFromFib(q){
  const answer = q.acc[0];
  if(!isShortTerm(answer)) return null;
  const banned = q.acc.map(norm);
  const ti = qTopicIndex(q);
  (fibAnswersByTopic()[ti] || []).forEach(f=>{
    if(f.qid !== q.qid) f.accs.forEach(a=> banned.push(a));   // exclude sibling fill-in answers
  });
  const pool = distractorPool().filter(d =>
    !banned.includes(d.key) && !q.acc.some(a=>relatedWord(a, d.term)));
  const near = shuffle(pool.filter(d=>d.ti===ti));
  const far  = shuffle(pool.filter(d=>d.ti!==ti));
  const picks = [];
  [...near, ...far].forEach(d=>{
    if(picks.length>=3) return;
    if(picks.some(p=>relatedWord(p, d.term))) return;
    picks.push(d.term);
  });
  if(picks.length < 3) return null;                    // not enough clean distractors → leave as fib
  const opts = shuffle([answer, ...picks]);
  return Object.assign({}, q, {type:"mc", opts, a: opts.indexOf(answer)});
}

const DIRECT_MC = /\?\s*$/;
const LIST_MC = /\b(these|following|which two|listed|appear|except|not one|is not|are indented)\b/i;
function fibFromMc(q){
  const ans = q.opts[q.a];
  if(!DIRECT_MC.test(q.q) || LIST_MC.test(q.q)) return null;
  const words = ans.trim().split(/\s+/);
  if(words.length>2 || ans.length>24 || /[^A-Za-z\s-]/.test(ans)) return null;   // no names w/ dots, numbers, phrases
  const acc = [ans];
  const noArt = ans.replace(/^(the|a|an)\s+/i, "");
  if(!acc.includes(noArt)) acc.push(noArt);
  const last = words[words.length-1];                  // accept the surname / key word alone
  if(words.length>1 && last.length>=4 && !acc.some(a=>norm(a)===norm(last))) acc.push(last);
  return Object.assign({}, q, {type:"fib", acc});
}

// Transform a question list for a difficulty. Idempotent: each copy carries
// its original as _orig, so re-running (retry, "again") re-derives cleanly.
function applyDifficulty(list, diff){
  return list.map(item=>{
    const orig = item._orig || item;
    const base = Object.assign({}, orig, {_orig:orig, _topic:item._topic || orig._topic});
    if(diff==="easy" && orig.type==="fib"){
      const m = mcFromFib(base); if(m){ m._orig=orig; m._topic=base._topic; return m; }
    }
    if(diff==="hard" && orig.type==="mc"){
      const f = fibFromMc(base); if(f){ f._orig=orig; f._topic=base._topic; return f; }
    }
    return base;
  });
}

function diffRow(){
  const d = state.diff || "medium";
  return '<div class="diffrow"><span class="difflabel">Difficulty</span>'+
    '<div class="diffseg" id="diffseg">'+
    ["easy","medium","hard"].map(x=>
      '<button data-d="'+x+'"'+(x===d?' class="on"':'')+'>'+x[0].toUpperCase()+x.slice(1)+'</button>').join("")+
    '</div><span class="diffhint">'+DIFF_HINT[d]+'</span></div>';
}
function wireDiff(rerender){
  const seg = $("#diffseg"); if(!seg) return;
  seg.querySelectorAll("button").forEach(b=> b.onclick = ()=>{
    if(state.diff === b.dataset.d) return;
    state.diff = b.dataset.d; save(); rerender();
  });
}

function startQuiz(questions, id, title, isRetry){
  stopExamTimer();
  const diff = state.diff || "medium";
  quiz = {qs: applyDifficulty(questions, diff), i:0, correct:0, wrong:[], id:id, title:title, retry:!!isRetry, diff:diff};
  renderQ();
  window.scrollTo(0,0);
}

function renderQ(){
  const q = quiz.qs[quiz.i];
  const typeLabel = q.type==="mc" ? "Multiple choice" : q.type==="tf" ? "True or false" : "Fill in the blank";
  const progress = Math.round(100*quiz.i/quiz.qs.length);

  let body = "";
  if(q.type==="mc"){
    // Render options in shuffled order; data-i keeps the original index so
    // scoring/highlighting stay correct and the answer isn't always "A".
    const order = shuffle(q.opts.map((_,i)=>i));
    body = '<div class="opts">'+ order.map((orig,pos)=>
      '<button class="opt" data-i="'+orig+'"><span class="key">'+"ABCD"[pos]+'</span><span>'+esc(q.opts[orig])+'</span></button>'
    ).join("") +'</div>';
  } else if(q.type==="tf"){
    body = '<div class="opts">'+
      '<button class="opt" data-i="1"><span class="key">T</span><span>True</span></button>'+
      '<button class="opt" data-i="0"><span class="key">F</span><span>False</span></button>'+
    '</div>';
  } else {
    body = '<div class="fib"><input type="text" id="fibin" autocomplete="off" autocapitalize="off" '+
      'spellcheck="false" placeholder="Type your answer…"><button class="btn" id="fibgo">Check</button></div>';
  }

  main.innerHTML =
    '<div class="qhead"><div class="kicker" style="margin:0">'+esc(quiz.title)+(quiz.retry?" · retry":"")+'</div>'+
    '<div class="qcount">Question '+(quiz.i+1)+' of '+quiz.qs.length+' · '+quiz.correct+' right</div></div>'+
    '<div class="qbar"><i style="width:'+progress+'%"></i></div>'+
    '<div class="qtype">'+typeLabel+'</div>'+
    (q._topic? '<div style="color:var(--muted);font-size:13px;margin-bottom:6px">from: '+esc(q._topic)+'</div>' : '')+
    '<p class="qtext">'+q.q+'</p>'+
    body+
    (quiz.diff==="easy" && q.type==="mc" && q.opts.length>2
      ? '<button class="hintbtn" id="hintbtn">💡 Hint · remove a wrong answer</button>' : '')+
    '<div id="fbslot"></div>';

  if(q.type==="fib"){
    const inp = $("#fibin");
    inp.focus();
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") checkFib(); });
    $("#fibgo").onclick = checkFib;
  } else {
    main.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick = ()=> checkChoice(parseInt(btn.dataset.i,10));
    });
  }

  if($("#hintbtn")) $("#hintbtn").onclick = ()=>{
    // Dim one still-standing wrong option; never touch the correct one,
    // never drop below two choices.
    const live = [...main.querySelectorAll(".opt")].filter(b=>
      !b.classList.contains("dimmed") && parseInt(b.dataset.i,10) !== q.a);
    if(live.length <= 1) return;
    const pick = live[Math.floor(Math.random()*live.length)];
    pick.classList.add("dimmed"); pick.disabled = true;
    if(live.length - 1 <= 1) $("#hintbtn").disabled = true;
  };
}

function checkChoice(picked){
  const q = quiz.qs[quiz.i];
  const right = q.type==="tf" ? (q.a===true?1:0) : q.a;
  const ok = picked===right;
  main.querySelectorAll(".opt").forEach(b=>{
    const i = parseInt(b.dataset.i,10);
    b.disabled = true;
    if(i===right) b.classList.add("correct");
    else if(i===picked) b.classList.add("wrong");
  });
  finishQ(ok, q);
}

function checkFib(){
  const q = quiz.qs[quiz.i];
  const inp = $("#fibin");
  const val = norm(inp.value);
  if(!val) { inp.focus(); return; }
  const ok = q.acc.some(a=> norm(a)===val);
  inp.disabled = true;
  $("#fibgo").disabled = true;
  inp.style.borderColor = ok ? "var(--good)" : "var(--bad)";
  finishQ(ok, q);
}

// Per-question mastery stats + spaced-review scheduling.
// Every answer counts, in any mode. Mastered (streak 2) starts the review
// clock; each further correct answer pushes the next check out one interval;
// a miss resets streak AND schedule, dropping the question back into the drill.
function recordAnswer(ok, q){
  if(!q.qid) return null;
  const stq = state.q[q.qid] || (state.q[q.qid] = {s:0,r:0,k:0});
  const preK = stq.k, wasDue = !!(stq.due && stq.due <= Date.now());
  const lv0 = levelOf(state.xp.p);

  stq.s++;
  if(ok){
    stq.r++; stq.k++;
    if(stq.k === 2){ stq.iv = 0; stq.due = Date.now() + REVIEW_IVS[0]; }
    else if(stq.k > 2){ stq.iv = Math.min((stq.iv||0)+1, REVIEW_IVS.length-1); stq.due = Date.now() + REVIEW_IVS[stq.iv]; }
  } else {
    stq.k = 0; delete stq.due; delete stq.iv;
  }

  // --- reinforcement ---
  if(touchStreak() && state.xp.streak > 1 && !xpQuiet)
    toast("🔥 "+state.xp.streak+"-day streak", "streak", 2600);
  if(ok){
    const grinding = preK >= 2 && !wasDue;                 // re-answering something already known
    if(grinding)      awardXP(2,  null, "already mastered");
    else if(wasDue)   awardXP(15, null, "review held");
    else              awardXP(10);
    if(stq.k === 2)   awardXP(25, null, "mastered");
    if(!grinding && Math.random() < 0.2) awardXP(25, "vr", "variable-ratio bonus");
  }
  if(!xpQuiet) checkLevelUp(lv0);

  save();
  renderXP();          // keep the sidebar card live between questions, not just on view changes
  return stq;
}

function finishQ(ok, q){
  if(ok) quiz.correct++; else quiz.wrong.push(q);

  const stq = recordAnswer(ok, q);
  let streakNote = "";
  if(stq){
    if(ok && stq.k===2) streakNote = " · mastered ✓ · review in "+ivLabel(0);
    else if(ok && stq.k>2) streakNote = " · streak "+stq.k+" · next check in "+ivLabel(stq.iv);
    else if(ok) streakNote = " · 1 more to master";
    else if(stq.s>1) streakNote = " · streak reset";
  }

  let answerLine = "";
  if(!ok){
    if(q.type==="mc") answerLine = "Answer: "+q.opts[q.a]+". ";
    else if(q.type==="tf") answerLine = "Answer: "+(q.a?"True":"False")+". ";
    else answerLine = "Answer: "+q.acc[0]+". ";
  }
  const fb = document.createElement("div");
  fb.className = "fb " + (ok?"ok":"no");
  fb.innerHTML =
    '<div class="verdict">'+(ok?"✓ Correct":"✗ Not quite")+esc(streakNote)+'</div>'+
    '<div class="why">'+esc(answerLine)+esc(q.why)+'</div>'+
    '<div class="src">Source: '+esc(q.src)+'</div>'+
    '<div class="btnrow" style="margin-top:16px"><button class="btn" id="nextq">'+
      (quiz.i+1 < quiz.qs.length ? "Next question" : "See results")+'</button></div>';
  $("#fbslot").appendChild(fb);
  $("#nextq").focus();
  $("#nextq").onclick = ()=>{
    quiz.i++;
    if(quiz.i < quiz.qs.length) renderQ(); else showResult();
  };
  fb.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function showResult(){
  const total = quiz.qs.length, c = quiz.correct;
  const p = Math.round(100*c/total);

  // Only a full (non-retry) run updates the recorded best score.
  if(!quiz.retry){
    const prev = state.best[quiz.id];
    if(!prev || c/total > prev.correct/prev.total) state.best[quiz.id] = {correct:c,total:total};
    save();
  }

  const msg = p===100 ? "Every question right. Nothing left to review here."
    : p>=80 ? "Strong pass — tidy up the misses and you're done."
    : p>=50 ? "Halfway there. Run the wrong ones back."
    : "Worth re-reading the study sheet before another pass.";

  let html = '<div class="result">'+
    '<div class="score">'+c+'<span style="color:var(--muted);font-size:.5em">/'+total+'</span></div>'+
    '<div class="pct">'+p+'%</div>'+
    '<div class="msg">'+esc(msg)+'</div>'+
    '<div class="btnrow">';
  if(quiz.wrong.length){
    const w = quiz.wrong.slice();
    html += '<button class="btn" id="retrywrong">Retry '+w.length+' wrong '+(w.length===1?"answer":"answers")+'</button>';
  }
  html += (quiz.id==="__due" ? '' : '<button class="btn ghost" id="again">'+(quiz.id.startsWith("__drill")?"New drill":"Take it again")+'</button>')+
          '<button class="btn ghost" id="back">'+(quiz.id.startsWith("__")?"Back":"Back to study sheet")+'</button>'+
          '</div></div>';
  main.innerHTML = html;

  const wrongCopy = quiz.wrong.slice();
  const qsCopy = quiz.qs.slice();
  const id = quiz.id, title = quiz.title;

  if($("#retrywrong")) $("#retrywrong").onclick = ()=> startQuiz(shuffle(wrongCopy), id, title, true);
  if($("#again")) $("#again").onclick = ()=>{
    if(id.startsWith("__mixed")) startQuiz(drawMixed(scopeOf(id)), id, title);
    else if(id.startsWith("__drill")) startQuiz(weakPool(scopeOf(id)), id, title, true);
    else if(id==="__custom") startQuiz(buildCustomPool(), id, title, true);
    else startQuiz(qsCopy, id, title);
  };
  $("#back").onclick = ()=>
    id.startsWith("__mixed") ? showMixedIntro() :
    id.startsWith("__drill") ? showDrillIntro() :
    id==="__custom" ? showBuilder() :
    id==="__due" ? showDueIntro() : showTopic(id);
  renderNav();
  window.scrollTo(0,0);
}

/* ============================================================
   EXAM MODE — timed, no feedback until the end
   ============================================================ */
let exam = null, examTick = null;

function stopExamTimer(){ if(examTick){ clearInterval(examTick); examTick = null; } }
function fmtMs(ms){
  const s = Math.max(0, Math.ceil(ms/1000));
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}
// Target exam length: a single topic = all its questions; a deck / all-topics =
// at least EXAM_SIZE, but always enough for ≥2 from every topic in scope.
function examTarget(scope){
  const src = topicsInScope(scope);
  return isTopicScope(scope) ? src[0].questions.length : Math.max(EXAM_SIZE, 2*src.length);
}
function examPool(scope){
  const src = topicsInScope(scope);
  if(isTopicScope(scope)){
    const t = src[0];
    return shuffle(t.questions.map(q=>Object.assign({},q,{_topic:t.title})));
  }
  const target = examTarget(scope);
  let picked = [];
  const rest = [];
  src.forEach(t=>{
    const qs = shuffle(t.questions.map(q=>Object.assign({},q,{_topic:t.title})));
    picked = picked.concat(qs.slice(0,2));
    rest.push(...qs.slice(2));
  });
  picked = picked.concat(shuffle(rest).slice(0, Math.max(0, target - picked.length)));
  return shuffle(picked).slice(0, target);
}

function showExamIntro(){
  stopExamTimer();
  const scope = state.scope.exam || "__all";
  const single = isTopicScope(scope);
  const n = examTarget(scope);
  const mins = Math.round(examDuration(n, scope)/60000);
  const label = scopeLabel(scope);
  const b = state.examBest;
  const summary = single
    ? 'Every question from “'+esc(label)+'” under exam conditions — '+mins+' minutes on the clock, no feedback until the end.'
    : scope==="__all"
      ? n+' questions drawn from every topic in both decks, '+mins+' minutes on the clock, no feedback until the end — exam conditions.'
      : n+' questions from the '+esc(label)+' deck, '+mins+' minutes on the clock, no feedback until the end — exam conditions.';
  main.innerHTML =
    '<div class="kicker">Exam mode</div><h1>📝 Mock exam</h1>'+
    '<p class="summary">'+summary+' '+EXAM_PASS+'% is the pass mark. Every answer still counts toward per-question mastery, so misses land in the weak-spot drill.</p>'+
    '<div class="scoperow"><span>Questions from:</span>'+topicScopeSelect("examscope", scope)+'</div>'+
    '<ul class="points">'+
      (single? '<li>All '+n+' questions of the topic, shuffled; fill-ins lock on Enter.</li>'
         : '<li>At least 2 questions from each topic in scope; fill-ins lock on Enter.</li>')+
      '<li>If time runs out, unanswered questions count as wrong.</li>'+
      (b? '<li>Best full exam: '+b.correct+'/'+b.total+' ('+Math.round(100*b.correct/b.total)+'%)'+(b.pass?' — a pass.':'.')+'</li>':'')+
    '</ul>'+
    diffRow()+
    '<div class="btnrow"><button class="btn" id="startexam">Start exam · '+n+' questions · '+mins+' min</button></div>';
  $("#examscope").onchange = e=>{ state.scope.exam = e.target.value; save(); showExamIntro(); };
  $("#startexam").onclick = ()=> startExam(scope);
  wireDiff(showExamIntro);
  renderNav(); window.scrollTo(0,0);
}

function startExam(scope){
  stopExamTimer();
  scope = scope || "__all";
  const pool = applyDifficulty(examPool(scope), state.diff || "medium");
  exam = {qs: pool, i:0, answers:[], scope: scope, lv0: levelOf(state.xp.p),
          t0: Date.now(), end: Date.now()+examDuration(pool.length, scope)};
  xpQuiet = true; xpBatch = 0;          // no XP toasts mid-exam — they would leak right/wrong
  examTick = setInterval(()=>{
    const el = $("#examclock");
    if(!el) return;                       // view changed; closeMenu clears us too
    const left = exam.end - Date.now();
    if(left <= 0){ finishExam(true); return; }
    el.textContent = fmtMs(left);
    el.parentElement.classList.toggle("low", left < 2*60*1000);
  }, 250);
  renderExamQ();
  window.scrollTo(0,0);
}

function renderExamQ(){
  const q = exam.qs[exam.i];
  const typeLabel = q.type==="mc" ? "Multiple choice" : q.type==="tf" ? "True or false" : "Fill in the blank";
  let body = "";
  if(q.type==="mc"){
    const order = shuffle(q.opts.map((_,i)=>i));
    body = '<div class="opts">'+ order.map((orig,pos)=>
      '<button class="opt" data-i="'+orig+'"><span class="key">'+"ABCD"[pos]+'</span><span>'+esc(q.opts[orig])+'</span></button>'
    ).join("") +'</div>';
  } else if(q.type==="tf"){
    body = '<div class="opts">'+
      '<button class="opt" data-i="1"><span class="key">T</span><span>True</span></button>'+
      '<button class="opt" data-i="0"><span class="key">F</span><span>False</span></button>'+
    '</div>';
  } else {
    body = '<div class="fib"><input type="text" id="fibin" autocomplete="off" autocapitalize="off" '+
      'spellcheck="false" placeholder="Type your answer…"><button class="btn" id="fibgo">Lock in</button></div>';
  }
  main.innerHTML =
    '<div class="examtimer"><span>📝 Mock exam · '+(exam.i+1)+' of '+exam.qs.length+'</span>'+
    '<span id="examclock">'+fmtMs(exam.end-Date.now())+'</span></div>'+
    '<div class="qbar"><i style="width:'+Math.round(100*exam.i/exam.qs.length)+'%"></i></div>'+
    '<div class="qtype">'+typeLabel+'</div>'+
    '<p class="qtext">'+q.q+'</p>'+
    body;
  if(q.type==="fib"){
    const inp = $("#fibin");
    inp.focus();
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter") examAnswer("fib"); });
    $("#fibgo").onclick = ()=> examAnswer("fib");
  } else {
    main.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick = ()=> examAnswer(parseInt(btn.dataset.i,10));
    });
  }
}

function examAnswer(val){
  const q = exam.qs[exam.i];
  let ok, given;
  if(val === "fib"){
    const raw = $("#fibin").value;
    if(!norm(raw)){ $("#fibin").focus(); return; }
    ok = q.acc.some(a=> norm(a)===norm(raw));
    given = raw.trim();
  } else if(q.type==="tf"){
    ok = val === (q.a?1:0); given = val? "True":"False";
  } else {
    ok = val === q.a; given = q.opts[val];
  }
  recordAnswer(ok, q);
  exam.answers.push({q:q, ok:ok, given:given});
  exam.i++;
  if(exam.i < exam.qs.length) renderExamQ(); else finishExam(false);
}

function finishExam(expired){
  stopExamTimer();
  const unanswered = exam.qs.slice(exam.answers.length);
  unanswered.forEach(q=>{ recordAnswer(false, q); exam.answers.push({q:q, ok:false, given:null}); });
  xpQuiet = false;
  const earned = xpBatch; xpBatch = 0;
  if(earned > 0) toast("+"+earned+" XP · exam", null, 3000);
  checkLevelUp(exam.lv0);

  const total = exam.qs.length;
  const c = exam.answers.filter(a=>a.ok).length;
  const p = Math.round(100*c/total);
  const pass = p >= EXAM_PASS;
  const prev = state.examBest;
  // Only full-deck exams set the record — a single-topic run isn't comparable.
  if(exam.scope==="__all" && (!prev || c > prev.correct)) state.examBest = {correct:c, total:total, pass:pass};
  save();

  let html = '<div class="result">'+
    '<div class="score">'+c+'<span style="color:var(--muted);font-size:.5em">/'+total+'</span></div>'+
    '<div class="pct" style="color:'+(pass?"var(--good)":"var(--bad)")+'">'+p+'% — '+(pass?"PASS":"below the "+EXAM_PASS+"% pass mark")+'</div>'+
    '<div class="msg">'+(expired? "Time ran out — unanswered questions counted as wrong. ":"")+'Time used: '+fmtMs(Date.now()-exam.t0)+'.</div>'+
    '<div class="btnrow">'+
      (c<total? '<button class="btn" id="examdrill">Drill the '+(total-c)+' miss'+(total-c===1?"":"es")+'</button>':'')+
      '<button class="btn ghost" id="examagain">New exam</button>'+
      '<button class="btn ghost" id="examback">Back</button>'+
    '</div>'+
    '<h2 style="margin-top:34px;text-align:left">Answer review</h2>';
  exam.answers.forEach((a,i)=>{
    const q = a.q;
    const correctText = q.type==="mc" ? q.opts[q.a] : q.type==="tf" ? (q.a?"True":"False") : q.acc[0];
    html += '<div class="rev" style="text-align:left"><div class="rq">'+(i+1)+'. '+q.q+'</div>'+
      '<div class="ra '+(a.ok?"good":"bad")+'">'+
        (a.ok ? '✓ '+esc(correctText)
              : '✗ Your answer: '+esc(a.given===null? "— (not answered)" : a.given)+' — correct: '+esc(correctText))+'</div>'+
      (a.ok? '' : '<div class="why">'+esc(q.why)+'</div>')+
      '<div class="src">'+(q._topic? esc(q._topic)+' · ':'')+'Source: '+esc(q.src)+'</div></div>';
  });
  html += '</div>';
  main.innerHTML = html;

  const missed = exam.answers.filter(a=>!a.ok).map(a=>a.q);
  if($("#examdrill")) $("#examdrill").onclick = ()=> startQuiz(shuffle(missed), "__drill", "Exam misses", true);
  $("#examagain").onclick = ()=> startExam(exam.scope);
  $("#examback").onclick = showExamIntro;
  renderNav(); window.scrollTo(0,0);
}

/* ============================================================
   BOOT — resume the last profile, else pick one.
   enterProfile() then lands on the review queue if anything is due.
   ============================================================ */
migrateLegacy();
if(REG.last && REG.list.some(p => p.id === REG.last)) enterProfile(REG.last);
else if(REG.list.length === 1) enterProfile(REG.list[0].id);
else showProfiles();
</script>
